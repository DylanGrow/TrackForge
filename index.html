<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>TrackForge | NEON_FLUX</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main id="app">
        <header id="stats-bar" aria-live="polite">
            <div class="stat"><small>CHRONO</small><b id="display-time">00:00:00</b></div>
            <div class="stat"><small>RANGE</small><b id="display-dist">0.00</b><small>km</small></div>
            <div class="stat"><small>VELOCITY</small><b id="display-speed">0.0</b><small>km/h</small></div>
        </header>

        <div id="map-container">
            <canvas id="map-canvas"></canvas>
        </div>

        <nav id="controls">
            <button id="btn-start" class="primary">ENGAGE</button>
            <div id="active-controls" class="hidden">
                <button id="btn-pause">PAUSE</button>
                <button id="btn-stop" class="danger">TERMINATE</button>
            </div>
            <button id="btn-history">ARCHIVE</button>
        </nav>

        <section id="panel-history" class="panel hidden">
            <header><h2>SESSIONS</h2><button class="close-panel">×</button></header>
            <div id="history-list"></div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
